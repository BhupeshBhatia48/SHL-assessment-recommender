services:
  - type: web
    name: shl-assessment-recommender
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python scripts/build_catalog.py && python scripts/build_index.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
    healthCheckPath: /health
